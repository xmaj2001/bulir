services:
  api:
    build: ./web/api
    ports:
      - "5000:5000"
    env_file:
      - .env.docker.api
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./web/api:/app
      - api_node_modules:/app/node_modules
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build: ./web/frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.docker.frontend
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./web/frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - backend

  redis:
    image: "redis:alpine"
    ports:
      - "6380:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgresql:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  api_node_modules:
  frontend_node_modules:
